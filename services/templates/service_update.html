{% extends 'base.html' %}

{% block title %}Editar servico{% endblock %}

{% block content %}
  <h1>Editar Serviço</h1>

  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <table>
      {{ form.as_table }}
    </table>
    <button type="submit">Salvar</button>
    <a class="btn btn-danger" href="{% url 'service_delete' service.pk %}">
          Deletar
        </a>
  </form>
{% endblock %}
